<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Input Data</title>

<!-- ICON LIBRARY -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html, body{
  width:100%;
  overflow-x:hidden;
}

body{
  background:#f3f4f6;
  padding:20px;
  user-select:none;
  -webkit-user-select:none;
}

.container{
  max-width:500px;
  margin:auto;
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:24px;
}

/* ONLINE BOX */
.online-box{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:15px;
  margin-bottom:20px;
}

.online-title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:12px;
}

.online-list{
  display:flex;
  gap:12px;
  overflow-x:auto;
}

.user-online{
  min-width:90px;
  text-align:center;
}

/* ICON USER (FONT AWESOME) */
.user-icon{
  width:50px;
  height:50px;
  border-radius:50%;
  margin:auto;
  position:relative;
  border:2px solid #e5e7eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  color:#9ca3af;
}

.online-dot{
  width:10px;
  height:10px;
  background:#22c55e;
  border-radius:50%;
  position:absolute;
  bottom:4px;
  right:4px;
  border:2px solid white;
}

.user-name{font-size:13px;font-weight:bold;}
.user-status{font-size:11px;color:#666;}
.user-time{font-size:10px;color:#888;}

/* INPUT */
.label{margin-bottom:8px;font-weight:bold;}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
  margin-bottom:15px;
  font-size:16px;
  text-transform:uppercase;
}

.preview{
  background:#eef2ff;
  border:1px solid #c7d2fe;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  margin-bottom:10px;
}

.btn-save{background:#2563eb;color:white;}
.btn-reset{background:#ef4444;color:white;}
.btn-wa{background:#22c55e;color:white;}

/* HISTORY */
.history{margin-top:25px;}

.history h2{
  text-align:center;
  font-size:20px;
  font-weight:800;
  margin:25px 0 15px;
}

#listRiwayat{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:15px;
  font-size:18px;
  font-weight:bold;
  line-height:1.8;
}

.data-item{color:#111;}
.data-kembar{color:#ef4444;}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:30px;
  font-size:13px;
  color:#777;
  line-height:1.8;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.modal-box{
  background:white;
  width:100%;
  max-width:360px;
  border-radius:18px;
  padding:22px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  animation:pop .18s ease;
}

.modal-box h3{
  font-size:20px;
  margin-bottom:10px;
}

.modal-box p{
  font-size:14px;
  color:#666;
  margin-bottom:18px;
  line-height:1.5;
}

.modal-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:15px;
}

/* LOGIN */
.btn-login{
  background:#2563eb;
  color:white;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

/* RESET BUTTON FIX */
.modal-btn{
  display:flex;
  gap:10px;
  width:100%;
}

.modal-btn button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.btn-ok{background:#ef4444;color:white;}
.btn-cancel{background:#d1d5db;color:#111;}
.btn-info{background:#2563eb;color:white;width:100%;}

@keyframes pop{
  from{transform:scale(.9);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<h1>Penginputan Data Phase</h1>

<div class="online-box">
  <div class="online-title">User Online</div>
  <div class="online-list" id="onlineList"></div>
</div>

<div class="label">Nomor Phase</div>
<input type="text" id="phase" placeholder="Contoh: xxxB/xxxN"/>

<div class="label">Nomor Bag dan Tim</div>
<input type="text" id="angka" placeholder="Contoh: xxxD"/>

<div class="preview" id="preview"></div>

<button class="btn-save" onclick="simpanData()">Simpan Data</button>
<button class="btn-reset" onclick="resetSemua()">Reset Semua Data</button>
<button class="btn-wa" onclick="kirimWA()">Kirim ke WhatsApp</button>

<div class="history">
  <h2>DATA TERKUMPUL</h2>
  <div id="listRiwayat"></div>
</div>

<div class="footer">
© 2026 Zulfahmi Afnula — All Rights Reserved<br>
Input Manual Data Phase System v1.0<br>
Waktu akses: <span id="waktuAkses"></span>
</div>

</div>

<!-- LOGIN -->
<div class="modal" id="modalLogin">
  <div class="modal-box">
    <h3>Masukkan Nama</h3>
    <p>Silakan login untuk melanjutkan</p>
    <input type="text" id="namaUser" placeholder="Nama pengguna"/>
    <button class="btn-login" onclick="loginUser()">Masuk</button>
  </div>
</div>

<!-- INFO -->
<div class="modal" id="modalInfo">
  <div class="modal-box">
    <h3>Info</h3>
    <p id="infoText"></p>
    <button class="btn-info" onclick="tutupInfo()">OK</button>
  </div>
</div>

<!-- RESET -->
<div class="modal" id="modalReset">
  <div class="modal-box">
    <h3>Konfirmasi Reset</h3>
    <p>Yakin ingin menghapus semua data?</p>

    <div class="modal-btn">
      <button class="btn-cancel" onclick="tutupReset()">Batal</button>
      <button class="btn-ok" onclick="konfirmasiReset()">Hapus</button>
    </div>

  </div>
</div>

<!-- AUDIO -->
<audio id="soundSave" src="notif1.mp3" preload="auto"></audio>
<audio id="soundWarn" src="notif2.mp3" preload="auto"></audio>
<audio id="soundReset" src="notif3.mp3" preload="auto"></audio>

<script>

const phase=document.getElementById("phase");
const angka=document.getElementById("angka");
const preview=document.getElementById("preview");
const listRiwayat=document.getElementById("listRiwayat");
const modalLogin=document.getElementById("modalLogin");
const namaUser=document.getElementById("namaUser");
const onlineList=document.getElementById("onlineList");
const modalInfo=document.getElementById("modalInfo");
const modalReset=document.getElementById("modalReset");
const infoText=document.getElementById("infoText");
const waktuAkses=document.getElementById("waktuAkses");

const soundSave=document.getElementById("soundSave");
const soundWarn=document.getElementById("soundWarn");
const soundReset=document.getElementById("soundReset");

let semuaData=[];

const now = new Date();
waktuAkses.innerText = now.toLocaleString("id-ID");

modalLogin.style.display="flex";

namaUser.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    loginUser();
  }
});

function capitalize(str){
  return str.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
}

function loginUser(){

  let nama=namaUser.value.trim();
  if(!nama){
    showInfo("Nama tidak boleh kosong");
    return;
  }

  nama=capitalize(nama);

  modalLogin.style.display="none";

  onlineList.innerHTML=`
    <div class="user-online">
      <div class="user-icon">
        <i class="fa-solid fa-user"></i>
        <div class="online-dot"></div>
      </div>
      <div class="user-name">${nama}</div>
      <div class="user-status">Online</div>
      <div class="user-time">${now.toLocaleString("id-ID")}</div>
    </div>
  `;
}

angka.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    simpanData();
  }
});

phase.value="A";

function updatePreview(){
  phase.value=phase.value.toUpperCase();
  angka.value=angka.value.toUpperCase();
  preview.innerHTML=phase.value+angka.value;
}

phase.oninput=updatePreview;
angka.oninput=updatePreview;

function simpanData(){

  if(!angka.value.trim()){
    soundWarn.currentTime=0;
    soundWarn.play().catch(()=>{});
    showInfo("Input masih kosong");
    return;
  }

  soundSave.currentTime=0;
  soundSave.play().catch(()=>{});

  semuaData.push(phase.value+angka.value);
  renderData();
  angka.value="";
  updatePreview();
}

function renderData(){
  let html="";
  semuaData.forEach(v=>{
    let dup=semuaData.filter(x=>x===v).length;
    html+=`<div class="${dup>1?'data-kembar':'data-item'}">${v}</div>`;
  });
  listRiwayat.innerHTML=html;
}

function resetSemua(){

  soundWarn.currentTime=0;
  soundWarn.play().catch(()=>{});

  modalReset.style.display="flex";
}

function tutupReset(){
  modalReset.style.display="none";
}

function konfirmasiReset(){

  semuaData=[];

  soundReset.currentTime=0;
  soundReset.play().catch(()=>{});

  renderData();
  tutupReset();
  showInfo("Data berhasil direset");
}

function showInfo(msg){
  infoText.innerText=msg;
  modalInfo.style.display="flex";
}

function tutupInfo(){
  modalInfo.style.display="none";
}

function kirimWA(){
  if(!semuaData.length){

    soundWarn.currentTime=0;
    soundWarn.play().catch(()=>{});

    showInfo("Belum ada data");
    return;
  }

  window.open(
    "https://wa.me/?text="+encodeURIComponent(semuaData.join("\n")),
    "_blank"
  );
}

</script>

</body>
</html>
