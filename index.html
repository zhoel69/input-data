<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Input Data</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f3f4f6;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:24px;
}

.label{
  margin-bottom:8px;
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
  margin-bottom:15px;
  font-size:16px;
  text-transform:uppercase;
}

.preview{
  background:#eef2ff;
  border:1px solid #c7d2fe;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  margin-bottom:10px;
}

.btn-save{
  background:#2563eb;
  color:white;
}

.btn-reset{
  background:#ef4444;
  color:white;
}

.btn-wa{
  background:#22c55e;
  color:white;
}

.history{
  margin-top:25px;
}

.history h2{
  margin-bottom:15px;
  font-size:20px;
}

.item{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:18px;
  font-weight:bold;
  line-height:1.7;
}

</style>
</head>

<body>

<div class="container">

<h1>INPUT DATA</h1>

<div class="label">Nomor Phase</div>

<input
type="text"
id="phase"
placeholder="Contoh: A"
/>

<div class="label">Nomor / Angka</div>

<input
type="text"
id="angka"
placeholder="Contoh: 106"
/>

<div class="preview" id="preview"></div>

<button class="btn-save" onclick="simpanData()">
Simpan Data
</button>

<button class="btn-reset" onclick="resetData()">
Reset Input
</button>

<button class="btn-wa" onclick="kirimWA()">
Kirim ke WhatsApp
</button>

<div class="history">

<h2>Riwayat Input</h2>

<div id="listRiwayat"></div>

</div>

</div>

<script>

const phase = document.getElementById("phase");
const angka = document.getElementById("angka");
const preview = document.getElementById("preview");

function updatePreview(){

  phase.value = phase.value.toUpperCase();
  angka.value = angka.value.toUpperCase();

  preview.innerHTML =
  phase.value + angka.value;

}

phase.addEventListener("input", updatePreview);
angka.addEventListener("input", updatePreview);

function simpanData(){

  const hasil =
  phase.value + angka.value;

  if(hasil.trim() === ""){
    alert("Input masih kosong");
    return;
  }

  const list = document.getElementById("listRiwayat");

  const item = document.createElement("div");

  item.className = "item";

  item.innerHTML = hasil;

  list.innerHTML += item.outerHTML + "<br>";

}

function resetData(){

  phase.value = "";
  angka.value = "";

  preview.innerHTML = "";

}

function kirimWA(){

  const hasil =
  phase.value + angka.value;

  const url =
  `https://wa.me/?text=${encodeURIComponent(hasil)}`;

  window.open(url, "_blank");

}

updatePreview();

</script>

</body>
</html>
